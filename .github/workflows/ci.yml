name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Compile TypeScript
        run: npm run compile

      - name: Run tests
        run: xvfb-run -a npm test
        if: matrix.os == 'ubuntu-latest'
        env:
          VSCODE_TEST_TIMEOUT: 30000

      - name: Run tests
        run: npm test
        if: matrix.os != 'ubuntu-latest'
        env:
          VSCODE_TEST_TIMEOUT: 30000

      - name: Compute version
        run: bash scripts/compute-version.sh

      - name: Package extension
        run: npx vsce package --no-dependencies

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: usagebar-vsix-${{ matrix.os }}
          path: '*.vsix'
          retention-days: 14

  check-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Check package
        run: npx vsce ls --no-dependencies
